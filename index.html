<!-- index.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I miei animali Preferiti</title>
    <link rel="stylesheet" href="style.css">
    <!-- script creazione componente, react dom e babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">

        const { useState } = React;


        const ListaAnimali = () => {

            const animalsChoices = ["Cane", "Gatto", "Pappagallo", "Cavallo", "Panda"];

            // setto var di stato per gestione lista
            const [animals, setAnimals] = useState([]);

            const addList = () => {
                const randomIndex = Math.floor(Math.random() * animalsChoices.length);
                // salvataggio animale estratto casualmente
                const randomAnimal = animalsChoices[randomIndex];

                // passiamo tutto allo state per la modifica dell'array
                setAnimals((current) => {
                    return [...current, randomAnimal];
                });
            }

            return (
                <>
                    <button onClick={addList}>Aggiungi animale</button>

                    <details>
                        <summary>animali</summary>
                        <ul>
                            {animals.map((animale, i) => {
                                return <li key={i}>{animale}</li>
                            })}
                        </ul>
                    </details>
                </>
            )
        }
    </script>
    <!-- script per montaggio componente -->
    <script type="text/babel">

        const { createRoot } = ReactDOM;

        const listaAnimali = document.querySelector(".lista-animali");

        const root = createRoot(listaAnimali);
        root.render(<ListaAnimali />);

    </script>
</head>

<body>
    <header>
        <h1>I miei animali Preferiti</h1>
    </header>
    <main>
        <figure>
            <img src="https://picsum.photos/400/300" alt="Immagine Casuale">
        </figure>
        <div class="lista-animali"></div>
    </main>
    <footer>
        <p>Creato con amore da... un collega sbadato! 🐾</p>
    </footer>
</body>

</html>
