<!-- index.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I miei animali Preferiti</title>
    <link rel="stylesheet" href="style.css">
    <!-- script creazione componente, react dom e babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">

        const { useState } = React;

        // set model
        function Modal({
            title,
            content,
            show = false,
            onClose = () => { },
            onConfirm = () => { }

        }) {
            return show && ReactDOM.createPortal(
                <div className="modal-container">
                    <div className="modal">
                        <h2>{title}</h2>
                        <p>{content}</p>
                        <div>
                            <button onClick={onClose}>Annulla</button>
                            <button onClick={onConfirm}>Conferma</button>
                        </div>

                    </div>
                </div>,
                document.body
            )
        }

        const ListaAnimali = () => {

            const animalsChoices = ["Cane", "Gatto", "Pappagallo", "Cavallo", "Panda"];

            // setto var di stato per gestione lista
            const [animals, setAnimals] = useState([]);

            // setto var per gestione modale
            const [show, setShow] = useState(false);

            // setto var per gestione cambiamneto input utente
            const [animalName, setAnimalName] = useState("");

            const addAnimal = () => {
                // const randomIndex = Math.floor(Math.random() * animalsChoices.length);
                // // salvataggio animale estratto casualmente
                // const randomAnimal = animalsChoices[randomIndex];


                //vericafa esistanza
                if (!animalName) return;
                //altrimenti aggiungiamo
                setAnimals(current => [...current, animalName]);
                //pulizia input
                setAnimalName('');
                //chiusura 
                setShow(false);
            }

            return (
                <>
                    <button onClick={() => setShow(true)}>Aggiungi animale</button>

                    <details>
                        <summary>animali</summary>
                        <ul>
                            {animals.map((animale, i) => {
                                return <li key={i}>{animale}</li>
                            })}
                        </ul>
                    </details>

                    <Modal
                        show={show}
                        onClose={() => setShow(false)}
                        onConfirm={addAnimal}
                        title="Aggiungi un animale"
                        content={
                            <input
                                type="text"
                                placeholder="inserisci animale"
                                value={animalName}
                                onChange={event => setAnimalName(event.target.value)}
                            />
                        }
                    />
                </>
            )
        }
    </script>
    <!-- script per montaggio componente -->
    <script type="text/babel">

        const { createRoot } = ReactDOM;

        const listaAnimali = document.querySelector(".lista-animali");

        const root = createRoot(listaAnimali);
        root.render(<ListaAnimali />);

    </script>
</head>

<body>
    <header>
        <h1>I miei animali Preferiti</h1>
    </header>
    <main>
        <figure>
            <img src="https://picsum.photos/400/300" alt="Immagine Casuale">
        </figure>
        <div class="lista-animali"></div>
    </main>
    <footer>
        <p>Creato con amore da... un collega sbadato! 🐾</p>
    </footer>
</body>

</html>
