<!-- index.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I miei animali Preferiti</title>
    <link rel="stylesheet" href="style.css">
    <!-- script creazione componente, react dom e babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">

        const { useState } = React;

        // set model
        function Modal({
            title,
            content,
            show = false,
            onClose = () => { },
            onConfirm = () => { }

        }) {
            return show && ReactDOM.createPortal(
                <div className="modal-container">
                    <div className="modal">
                        <h2>{title}</h2>
                        <p>{content}</p>
                        <div>
                            <button onClick={onClose}>Annulla</button>
                            <button onClick={onConfirm}>Conferma</button>
                        </div>

                    </div>
                </div>,
                document.body
            )
        }

        const ListaAnimali = () => {

            const animalsChoices = ["Cane", "Gatto", "Pappagallo", "Cavallo", "Panda"];

            // setto var di stato per gestione lista
            const [animals, setAnimals] = useState([]);

            // setto var per gestione modale
            const [show, setShow] = useState(false);

            // setto var per gestione stato caricamento
            const [isLoading, setIsLoading] = useState(false);

            // setto var di stato per gestione errore in pagina
            const [errorMessage, setErrorMessage] = useState('');

            // setto var per gestione cambiamneto input utente
            const [animalName, setAnimalName] = useState("");

            const addAnimal = async () => {

                //vericafa esistanza
                if (!animalName.trim()) return;
                setIsLoading(true);
                // inizialmente vuoto perche non e' ancora avvenuta la ricerca di conseguenza nessun errore probabibile  
                setErrorMessage('')

                // gestione eventuali errori
                try {
                    const response = await fetch(`http://localhost:3333/animals?search=${animalName}`);
                    // preso il primo animale che corrisponde dovra poi  essere convertito
                    const [animalData] = await response.json();
                    // se non e' presente
                    if (!animalData) {
                        throw new Error("Nessun animale trovato")
                    }
                    // costruzione oggetto animale
                    const animal = {
                        name: animalData.name || "Nessun animale trovato",
                        description: animalData.description || "nessuna descrizione trovata",
                        image: animalData.image || null
                    }
                    //altrimenti aggiungiamo
                    setAnimals(current => [...current, animal]);

                } catch (error) {
                    console.error(error);
                    const message = error.messagge === 'Nessun animale trovato' ? 'Nessun animale trovato' : 'Errore durante la ricerca dell\'animale';
                    setErrorMessage(error.message)
                } finally {
                    setIsLoading(false);
                    //pulizia input
                    setAnimalName('');
                    //chiusura 
                    setShow(false);
                }
            }

            return (
                <>
                    <button onClick={() => setShow(true)}>Aggiungi animale</button>

                    <details>
                        <summary>animali</summary>
                        <div>
                            {errorMessage && <p style={{ color: 'red' }}>{errorMessage}</p>}
                            {animals.map((animale, i) => {
                                return <div key={i} className="card" >
                                    <div>
                                        <h3>{animal.name}</h3>
                                        <p>{animal.description}</p>
                                    </div>
                                    // se esiste esegui il codice
                                    {animal.image &&
                                        <figure>
                                            <img src={animal.image} alt={animal.name} />
                                        </figure>
                                    }
                                </div>
                            })}
                        </div>
                    </details>

                    <Modal
                        show={show}
                        onClose={() => setShow(false)}
                        onConfirm={addAnimal}
                        title="Aggiungi un animale"
                        content={<>
                            <input
                                type="text"
                                placeholder="inserisci animale"
                                value={animalName}
                                onChange={event => setAnimalName(event.target.value)}
                            />
                            {isLoading && <p>Caricando il risultato....</p>}
                        </>
                        }
                    />
                </>
            )
        }
    </script>
    <!-- script per montaggio componente -->
    <script type="text/babel">

        const { createRoot } = ReactDOM;

        const listaAnimali = document.querySelector(".lista-animali");

        const root = createRoot(listaAnimali);
        root.render(<ListaAnimali />);

    </script>
</head>

<body>
    <header>
        <h1>I miei animali Preferiti</h1>
    </header>
    <main>
        <figure>
            <img src="https://picsum.photos/400/300" alt="Immagine Casuale">
        </figure>
        <div class="lista-animali"></div>
    </main>
    <footer>
        <p>Creato con amore da... un collega sbadato! 🐾</p>
    </footer>
</body>

</html>
